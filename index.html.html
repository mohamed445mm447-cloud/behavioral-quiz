            transition: width 0.4s ease;

            border: 2px solid #e5e7eb;
        }

        .mcq-option:hover {
            border-color: #6366f1;
        }

        .explanation-box {

        // Current state
        let currentQuestionIndex = 0;
        let score = 0;
        let userAnswers = [];
        let answered = false;

        // Initialize the quiz
        function initQuiz() {
            initializeTailwind();
            showQuestion(currentQuestionIndex);
            
            // Keyboard support
            document.addEventListener('keydown', function(e) {
                if (e.key === "ArrowRight" && !document.getElementById('next-btn').disabled) {
                    nextQuestion();
                }
                if (e.key === "ArrowLeft") {
                    prevQuestion();
                }
            });
        }

        function showQuestion(index) {
            const q = questions[index];
            answered = false;
            
            // Update progress
            const progress = ((index) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = `${Math.round(progress)}%`;
            document.getElementById('question-counter').innerText = `${index + 1} / ${questions.length}`;
            
            // Section badge
            document.getElementById('section-badge').innerHTML = `
                <span class="px-3 py-1 text-xs font-bold tracking-[1px]">${q.section}</span>
            `;
            
            // Question text
            document.getElementById('question-text').innerHTML = `
                <span class="font-mono text-sm text-indigo-400 mr-2">Q${q.id}</span> 
                ${q.question}
            `;
            
            // Options
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((option, i) => {
                const btn = document.createElement('button');
                btn.className = `option-btn w-full text-left px-5 py-4 rounded-2xl bg-zinc-800 border border-zinc-700 hover:border-indigo-500 flex items-start gap-x-4 group`;
                btn.innerHTML = `
                    <div class="w-6 h-6 flex-shrink-0 mt-0.5 rounded-full border border-zinc-600 flex items-center justify-center text-xs font-mono group-hover:border-indigo-400">
                        ${String.fromCharCode(65 + i)}
                    </div>
                    <div class="text-[15.5px] leading-snug text-left">${option}</div>
                `;
                
                btn.onclick = () => selectAnswer(i, btn, q);
                optionsContainer.appendChild(btn);
            });
            
            // Hide explanation
            document.getElementById('explanation-container').classList.add('hidden');
            
            // Update navigation buttons
            document.getElementById('prev-btn').disabled = (index === 0);
            
            const nextBtn = document.getElementById('next-btn');
            const nextText = document.getElementById('next-btn-text');
            
            if (index === questions.length - 1) {
                nextText.innerText = "Finish Quiz";
                nextBtn.classList.add('!bg-emerald-500', '!text-white', 'hover:!bg-emerald-600');
            } else {
                nextText.innerText = "Next Question";
                nextBtn.classList.remove('!bg-emerald-500', '!text-white', 'hover:!bg-emerald-600');
            }
        }

        function selectAnswer(selectedIndex, btnElement, questionData) {
            if (answered) return;
            answered = true;
            
            const optionsContainer = document.getElementById('options-container');
            const allBtns = optionsContainer.querySelectorAll('button');
            
            const isCorrect = selectedIndex === questionData.correct;
            
            // Disable all buttons
            allBtns.forEach(b => b.disabled = true);
            
            // Highlight correct and wrong
            allBtns.forEach((b, idx) => {
                if (idx === questionData.correct) {
                    b.classList.add('correct', '!border-emerald-500');
                    b.classList.remove('border-zinc-700');
                } else if (idx === selectedIndex && !isCorrect) {
                    b.classList.add('wrong', '!border-red-500');
                    b.classList.remove('border-zinc-700');
                }
            });
            
            // Show explanation
            const explanationBox = document.getElementById('explanation-container');
            const explanationText = document.getElementById('explanation-text');
            
            explanationText.innerHTML = questionData.explanation;
            explanationBox.classList.remove('hidden');
            explanationBox.classList.add('explanation-box');
            
            // Update score
            if (isCorrect) {
                score++;
            }
            
            // Save answer
            userAnswers[currentQuestionIndex] = {
                selected: selectedIndex,
                correct: questionData.correct,
                isCorrect: isCorrect
            };
            
            // Auto advance after delay on last question? No, let user click Next
        }

        function nextQuestion() {
            if (!answered && currentQuestionIndex < questions.length - 1) {
                // If not answered, still allow moving forward but don't count score
                userAnswers[currentQuestionIndex] = { selected: null, correct: questions[currentQuestionIndex].correct, isCorrect: false };
            }
            
            currentQuestionIndex++;
            
            if (currentQuestionIndex < questions.length) {
                showQuestion(currentQuestionIndex);
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion(currentQuestionIndex);
            }
        }

        function showResults() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');
            
            const percentage = Math.round((score / questions.length) * 100);
            
            document.getElementById('final-score').innerText = `${score}`;
            document.getElementById('final-percentage').innerText = `${percentage}%`;
            document.getElementById('final-correct').innerText = `${score}/${questions.length}`;
            
            // Optional: You can add more detailed breakdown here if needed
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            userAnswers = [];
            answered = false;
            
            document.getElementById('results-screen').classList.add('hidden');
            document.getElementById('quiz-content').classList.remove('hidden');
            
            showQuestion(0);
        }

        // Start the quiz when page loads
        window.onload = function() {
            initQuiz();
        };
    </script>
